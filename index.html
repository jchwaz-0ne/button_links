<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto MP3 Open</title>
<link rel="icon" href="https://www.zdamyto.com/assets/fav/favicon.ico">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 40px;
}

textarea {
    width: 100%;
    height: 250px;
    font-family: Consolas, monospace;
    font-size: 14px;
    padding: 10px;
    box-sizing: border-box;
}
</style>
</head>

<body>

<h2>Вставьте HTML кнопки (Ctrl+V)</h2>

<textarea id="input" autofocus placeholder="Ждите вставки..."></textarea>


<script>

const input = document.getElementById("input");

input.focus();


input.addEventListener("paste", function () {

    setTimeout(function () {

        const html = input.value.trim();

        if (!html) return;


        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const btn = doc.querySelector("button");


        if (!btn) {
            input.value = "";
            input.focus();
            return;
        }


        const domain = btn.getAttribute("data-domain");
        const path = btn.getAttribute("data-path");
        const file = btn.getAttribute("data-file");


        if (domain && path && file) {

            const url = domain + path + file;

            // открыть MP3 в новой вкладке
            window.open(url, "_blank");

        }


        // очистить поле после открытия
        input.value = "";

        // вернуть курсор
        input.focus();


    }, 50);

});

</script>

</body>
</html>
